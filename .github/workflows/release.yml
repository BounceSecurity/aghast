name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.4, 0.5.0, 1.0.0)'
        required: true
        type: string

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Validate version input
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Must match x.y.z format
          if ! echo "$INPUT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: '$INPUT_VERSION'. Must be x.y.z (e.g. 1.2.0)"
            exit 1
          fi

          # Read current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          # Must differ from current
          if [ "$INPUT_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::error::Version $INPUT_VERSION is the same as the current version"
            exit 1
          fi

          # Must be strictly greater (semver comparison using node)
          IS_GREATER=$(node -e "
            const [aMaj, aMin, aPat] = '$INPUT_VERSION'.split('.').map(Number);
            const [bMaj, bMin, bPat] = '$CURRENT_VERSION'.split('.').map(Number);
            const gt = aMaj > bMaj || (aMaj === bMaj && aMin > bMin) || (aMaj === bMaj && aMin === bMin && aPat > bPat);
            console.log(gt ? 'yes' : 'no');
          ")
          if [ "$IS_GREATER" != "yes" ]; then
            echo "::error::Version $INPUT_VERSION is not greater than current version $CURRENT_VERSION"
            exit 1
          fi

          echo "Releasing v$INPUT_VERSION (current: v$CURRENT_VERSION)"

      - uses: ./.github/release-actions/wait-for-ci

      - name: Update version references
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node .github/scripts/update-version-refs.cjs "$INPUT_VERSION"

      - name: Commit version bump
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json docs/getting-started.md .github/workflows/release.yml
          git commit -m "chore: release v$INPUT_VERSION"
          git push

      - name: Create git tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git tag "v$INPUT_VERSION"
          git push origin "v$INPUT_VERSION"

      - name: Build, pack, and sign
        uses: ./.github/release-actions/build-pack-sign
        with:
          version: ${{ inputs.version }}

      - name: Publish to npmjs
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$INPUT_VERSION" \
            --title "v$INPUT_VERSION" \
            --generate-notes \
            "bouncesecurity-aghast-${INPUT_VERSION}.tgz" \
            "bouncesecurity-aghast-${INPUT_VERSION}.tgz.sigstore"
