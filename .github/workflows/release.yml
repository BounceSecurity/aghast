name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.2, 0.5.0, 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Validate version input
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Must match x.y.z format
          if ! echo "$INPUT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: '$INPUT_VERSION'. Must be x.y.z (e.g. 1.2.0)"
            exit 1
          fi

          # Read current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          # Must differ from current
          if [ "$INPUT_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::error::Version $INPUT_VERSION is the same as the current version"
            exit 1
          fi

          # Must be strictly greater (semver comparison using node)
          IS_GREATER=$(node -e "
            const [aMaj, aMin, aPat] = '$INPUT_VERSION'.split('.').map(Number);
            const [bMaj, bMin, bPat] = '$CURRENT_VERSION'.split('.').map(Number);
            const gt = aMaj > bMaj || (aMaj === bMaj && aMin > bMin) || (aMaj === bMaj && aMin === bMin && aPat > bPat);
            console.log(gt ? 'yes' : 'no');
          ")
          if [ "$IS_GREATER" != "yes" ]; then
            echo "::error::Version $INPUT_VERSION is not greater than current version $CURRENT_VERSION"
            exit 1
          fi

          echo "Releasing v$INPUT_VERSION (current: v$CURRENT_VERSION)"

      - name: Verify CI passed on current commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "Checking CI status for $SHA"

          MAX_WAIT=600  # 10 minutes
          INTERVAL=15
          ELAPSED=0

          while true; do
            RUN_JSON=$(gh run list --commit "$SHA" --workflow CI --json conclusion,status --jq '.[0] // empty')
            if [ -z "$RUN_JSON" ]; then
              echo "::error::No CI run found for commit $SHA. Ensure CI has run on main before releasing."
              exit 1
            fi

            STATUS=$(echo "$RUN_JSON" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion // empty')

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI passed on $SHA"
                break
              else
                echo "::error::CI did not pass on commit $SHA (conclusion: $CONCLUSION). Fix CI before releasing."
                exit 1
              fi
            fi

            # CI is still running — wait
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "::error::Timed out waiting for CI on commit $SHA (status: $STATUS after ${ELAPSED}s)"
              exit 1
            fi
            echo "CI is $STATUS on $SHA — waiting ${INTERVAL}s (${ELAPSED}s/${MAX_WAIT}s elapsed)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

      - name: Update version references
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node .github/scripts/update-version-refs.cjs "$INPUT_VERSION"
          npm install --package-lock-only --ignore-scripts

      - name: Commit version bump
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json docs/getting-started.md .github/workflows/release.yml
          git commit -m "chore: release v$INPUT_VERSION"
          git push

      - name: Create git tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git tag "v$INPUT_VERSION"
          git push origin "v$INPUT_VERSION"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build and pack
        run: |
          npm run build
          npm pack

      - name: Publish to npmjs
        run: npm publish --access public --provenance

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign release artifact
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: cosign sign-blob --yes --bundle "bouncesecurity-aghast-${INPUT_VERSION}.tgz.bundle" "bouncesecurity-aghast-${INPUT_VERSION}.tgz"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$INPUT_VERSION" \
            --title "v$INPUT_VERSION" \
            --generate-notes \
            "bouncesecurity-aghast-${INPUT_VERSION}.tgz" \
            "bouncesecurity-aghast-${INPUT_VERSION}.tgz.bundle"
