name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'
  pull_request:
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'

permissions:
  contents: read
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        shard: [1, 2, 3]
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run tests (shard ${{ matrix.shard }}/3)
        shell: bash
        run: |
          # Shard 1: cli-mock-mode-2 (~35s CI, env-var tests)
          # Shard 2: cli-mock-mode (~40s CI, CLI integration tests)
          # Shard 3: cli-subcommands + everything else (~30s CI)
          # New test files land in shard 3 automatically.
          case ${{ matrix.shard }} in
            1) files=(tests/cli-mock-mode-2.test.ts) ;;
            2) files=(tests/cli-mock-mode.test.ts) ;;
            3)
              all=($(printf '%s\n' tests/*.test.ts | sort))
              heavy=(tests/cli-mock-mode-2.test.ts tests/cli-mock-mode.test.ts)
              files=()
              for f in "${all[@]}"; do
                skip=false
                for h in "${heavy[@]}"; do
                  if [[ "$f" == "$h" ]]; then skip=true; break; fi
                done
                if [[ "$skip" == "false" ]]; then files+=("$f"); fi
              done
              ;;
          esac
          echo "Shard ${{ matrix.shard }}/3: running ${#files[@]} test files"
          printf '  %s\n' "${files[@]}"
          node --import tsx --test \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=test-results.xml \
            "${files[@]}"
        env:
          AGHAST_SKIP_SEMGREP_TESTS: 'true'

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}-shard-${{ matrix.shard }}
          path: test-results.xml

  test-gate:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test matrix failed: ${{ needs.test.result }}"
            exit 1
          fi

  build-and-install-gate:
    runs-on: ubuntu-latest
    needs: build-and-install
    if: always()
    steps:
      - name: Check build-and-install matrix result
        run: |
          if [ "${{ needs.build-and-install.result }}" != "success" ]; then
            echo "Build-and-install matrix failed: ${{ needs.build-and-install.result }}"
            exit 1
          fi

  test-results:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v7
        with:
          pattern: test-results-*

      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: '**/test-results.xml'
          check_name: Test Results
          include_passed: true

  semgrep-integration:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Single Node version per OS: Semgrep + SARIF parsing is not
        # Node-version-sensitive; version coverage comes from test shards.
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: echo semgrep > requirements.txt

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Semgrep
        run: pip install -r requirements.txt

      - name: Run Semgrep integration tests
        run: pnpm test:semgrep

  build-and-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # Verify the package builds, packs, and installs correctly.
      # This mirrors the release workflow: build → pack → install tarball.
      - name: Clone repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git clone --depth=1 --branch "${{ github.head_ref || github.ref_name }}" "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "${{ runner.temp }}/aghast-install"

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Build and pack
        working-directory: ${{ runner.temp }}/aghast-install
        run: |
          pnpm install
          pnpm build
          pnpm pack

      - name: Install from tarball
        shell: bash
        run: npm install -g "${{ runner.temp }}"/aghast-install/bouncesecurity-aghast-*.tgz

      - name: Verify CLI works
        run: |
          aghast --version
          aghast --help

  osv-scanner:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3"
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      fail-on-vuln: true
      upload-sarif: false
