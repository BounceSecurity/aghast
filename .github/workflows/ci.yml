name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'
  pull_request:
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        shard: [1, 2, 3, 4]
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests (shard ${{ matrix.shard }}/3)
        shell: bash
        run: |
          # Shard 1: cli-mock-mode-2 (~35s CI, env-var tests)
          # Shard 2: cli-mock-mode (~40s CI, CLI integration tests)
          # Shard 3: cli-subcommands + everything else (~30s CI)
          # Shard 4: fuzz tests (~47s Windows, ~16s macOS)
          # New test files land in shard 3 automatically.
          case $SHARD in
            1) files=(tests/cli-mock-mode-2.test.ts) ;;
            2) files=(tests/cli-mock-mode.test.ts) ;;
            3)
              all=($(printf '%s\n' tests/*.test.ts | sort))
              heavy=(tests/cli-mock-mode-2.test.ts tests/cli-mock-mode.test.ts tests/fuzz.test.ts)
              files=()
              for f in "${all[@]}"; do
                skip=false
                for h in "${heavy[@]}"; do
                  if [[ "$f" == "$h" ]]; then skip=true; break; fi
                done
                if [[ "$skip" == "false" ]]; then files+=("$f"); fi
              done
              ;;
            4) files=(tests/fuzz.test.ts) ;;
          esac
          echo "Shard $SHARD/4: running ${#files[@]} test files"
          printf '  %s\n' "${files[@]}"
          node --import tsx --test \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=junit --test-reporter-destination=test-results.xml \
            "${files[@]}"
        env:
          AGHAST_SKIP_SEMGREP_TESTS: 'true'
          SHARD: ${{ matrix.shard }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}-shard-${{ matrix.shard }}
          path: test-results.xml

  test-gate:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test matrix result
        env:
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [ "$TEST_RESULT" != "success" ]; then
            echo "Test matrix failed: $TEST_RESULT"
            exit 1
          fi

  build-and-install-gate:
    runs-on: ubuntu-latest
    needs: build-and-install
    if: always()
    steps:
      - name: Check build-and-install matrix result
        env:
          BUILD_RESULT: ${{ needs.build-and-install.result }}
        run: |
          if [ "$BUILD_RESULT" != "success" ]; then
            echo "Build-and-install matrix failed: $BUILD_RESULT"
            exit 1
          fi

  test-results:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test-results-*

      - name: Publish test results
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6
        with:
          report_paths: '**/test-results.xml'
          check_name: Test Results
          include_passed: true

  semgrep-integration:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Single Node version per OS: Semgrep + SARIF parsing is not
        # Node-version-sensitive; version coverage comes from test shards.
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: echo semgrep > requirements.txt

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Semgrep
        run: pip install -r requirements.txt

      - name: Run Semgrep integration tests
        run: npm run test:semgrep

  openant-integration:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Build OpenAnt from fork (Unix)
        if: runner.os != 'Windows'
        run: |
          git clone https://github.com/joshbouncesecurity/OpenAnt.git /tmp/openant
          cd /tmp/openant/apps/openant-cli
          go build -o bin/openant ./main.go
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Build OpenAnt from fork (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/joshbouncesecurity/OpenAnt.git $env:RUNNER_TEMP\openant
          Set-Location $env:RUNNER_TEMP\openant\apps\openant-cli
          go build -o bin\openant.exe .\main.go
          "$PWD\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run OpenAnt integration tests
        run: npm run test:openant

  build-and-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event.repository.name == 'aghast' && fromJSON('["windows-latest","ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: aghast-install

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build and pack
        working-directory: aghast-install
        run: |
          npm install
          npm run build
          npm pack

      - name: Install from tarball
        shell: bash
        run: npm install -g ./aghast-install/bouncesecurity-aghast-*.tgz

      - name: Verify CLI works
        run: |
          aghast --version
          aghast --help

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: low
